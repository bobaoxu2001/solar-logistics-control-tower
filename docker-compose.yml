services:
  postgres:
    image: postgres:16-alpine
    container_name: sunlog-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sunlog}
      # Local-only placeholder; override via an untracked .env file.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-sunlog}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sunlog}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
