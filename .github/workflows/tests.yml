name: Portfolio CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download and verify the pinned public dataset
        run: |
          mkdir -p data/raw
          curl --fail --location --retry 3 \
            "https://raw.githubusercontent.com/suheb1231/SCMS-Delivery-History-Dataset/main/SCMS_Delivery_History_Dataset%20(1).csv" \
            --output data/raw/scms_delivery_history_raw.csv
          printf '%s  %s\n' \
            '918b992dd3e8d4b64d2a727b2c4ea607603d0c58f19484e73f7b78528c6a8673' \
            'data/raw/scms_delivery_history_raw.csv' | sha256sum --check --strict

      - name: Build deterministic integration-test data
        run: |
          python src/clean_shipments.py
          python src/run_phase2.py
          python src/run_phase3.py

      - name: Restore committed portfolio presentation assets
        run: |
          expected_changes="$(printf '%s\n' \
            documentation/data_dictionary.xlsx \
            documentation/interview_materials.md \
            documentation/phase2_summary.md \
            documentation/phase3_summary.md \
            documentation/source_to_target_mapping.xlsx \
            excel/logistics_kpi_pack.xlsx)"
          actual_changes="$(git diff --name-only)"
          test "$actual_changes" = "$expected_changes"
          git restore -- \
            documentation/data_dictionary.xlsx \
            documentation/interview_materials.md \
            documentation/phase2_summary.md \
            documentation/phase3_summary.md \
            documentation/source_to_target_mapping.xlsx \
            excel/logistics_kpi_pack.xlsx

      - name: Run full test suite
        run: python -m pytest tests/ -q

      - name: Run repository health check
        run: python src/check_repository_health.py

      - name: Run publication audit
        run: python src/run_publication_audit.py

      - name: Check patch whitespace
        run: git diff --check
