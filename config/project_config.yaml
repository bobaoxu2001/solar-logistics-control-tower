# ---------------------------------------------------------------------------
# Solar Logistics Control Tower — project configuration
# Single source of truth for reproducibility-sensitive settings.
# ---------------------------------------------------------------------------

project_name: solar-logistics-control-tower
random_seed: 42

# --- Source dataset -------------------------------------------------------
# USAID "Supply Chain Shipment Pricing Data" (SCMS Delivery History Dataset).
# The official portal (data.usaid.gov, Socrata id a3rc-nmf6) was decommissioned
# in 2025; the file is acquired from public GitHub mirrors and verified against
# a pinned SHA-256 so every mirror must produce a byte-identical file.
source_dataset:
  name: SCMS Delivery History Dataset
  original_publisher: USAID
  original_portal: https://data.usaid.gov/Health/Supply-Chain-Shipment-Pricing-Data/a3rc-nmf6 (offline)
  reuse_terms_note: Exact reuse terms were not independently verified for this portfolio; review the original source terms before redistribution.
  sha256: 918b992dd3e8d4b64d2a727b2c4ea607603d0c58f19484e73f7b78528c6a8673
  expected_rows: 10324
  expected_columns: 33
  local_path: data/raw/scms_delivery_history_raw.csv
  mirrors:
    - "https://raw.githubusercontent.com/suheb1231/SCMS-Delivery-History-Dataset/main/SCMS_Delivery_History_Dataset%20(1).csv"
    - "https://media.githubusercontent.com/media/pandey-rakshit/data-library/main/FedEx/SCMS_Delivery_History_Dataset.csv"

# --- Case-study adaptation ------------------------------------------------
# The source data records pharmaceutical shipments (HIV/malaria programs).
# Real shipment PATTERNS (dates, modes, weights, values, freight costs,
# origins, destinations) are preserved; the PRODUCT IDENTITY is remapped to a
# renewable-energy catalog for the SunGrid Energy Solutions case study.
# Lineage to the original record is kept on every row (source_record_id).
adaptation:
  company_name: SunGrid Energy Solutions
  # Deliberate, deterministic mapping keyed on (Product Group, Sub Classification).
  # "*" matches any sub-classification not listed explicitly.
  product_category_map:
    "ARV|Adult": SOLAR_MODULE
    "ARV|Pediatric": INVERTER
    "HRDT|HIV test": BATTERY_ESS
    "HRDT|HIV test - Ancillary": BOS_COMPONENT
    "ANTM|*": BOS_COMPONENT
    "ACT|*": BOS_COMPONENT
    "MRDT|*": BOS_COMPONENT
  product_category_labels:
    SOLAR_MODULE: Solar Modules
    INVERTER: Inverters
    BATTERY_ESS: Battery Energy Storage Systems
    BOS_COMPONENT: Electrical Balance-of-System Components
  # Source deliveries span 2006-06 .. 2015-09. Dates are shifted forward by a
  # constant so dashboards show a recent window (2016-06 .. 2025-09) while
  # preserving every interval, weekday-independent duration and seasonality gap.
  date_shift_years: 10

# --- Cleaning rules -------------------------------------------------------
cleaning:
  date_format: "%d-%b-%y"            # e.g. 2-Jun-06
  date_sentinels:                    # parsed as NULL + flagged, never dropped
    - "Pre-PQ Process"
    - "Date Not Captured"
    - "N/A - From RDC"
  # Non-numeric sentinels in Weight (Kilograms) / Freight Cost (USD).
  # "See DN-xxxx (ID#:yyyy)" and "See ASN-xxxx (ID#:yyyy)" are cross-references
  # to another shipment row; the pipeline resolves them by ID lookup.
  reference_pattern: "ID#:\\s*(\\d+)"
  weight_sentinels:
    - "Weight Captured Separately"
  freight_sentinels:
    - "Freight Included in Commodity Cost"
    - "Invoiced Separately"
  shipment_mode_map:                 # normalization; NULL mode is kept + flagged
    "Air": AIR
    "Air Charter": AIR_CHARTER
    "Truck": TRUCK
    "Ocean": OCEAN

# --- Database -------------------------------------------------------------
database:
  # DATABASE_URL env var wins; this is the fallback of the fallback.
  default_url: sqlite:///data/processed/sunlog.db
  schema: sunlog                     # applied on PostgreSQL only; SQLite has no schemas

# ===========================================================================
# PHASE 2 — Enterprise logistics data simulation (additive; no Phase 1 key
# above is modified). All generation is deterministic under random_seed.
# Every number here is either grounded in the observed source distribution
# (see documentation/business_requirements.md §Phase 2) or a documented
# operational assumption. data_class on every generated table records
# provenance (PUBLIC / DERIVED / SIMULATED); it is this project's name for the
# "source_type" concept and is not duplicated.
# ===========================================================================
phase2:
  # --- Carrier master (fictional names; 12 carriers across all modes) -------
  carriers:
    - {carrier_id: CAR01, carrier_name: "Helios Ocean Lines",          carrier_type: OCEAN_LINE,  primary_mode: OCEAN,       operating_region: GLOBAL,        payment_terms: NET45, default_currency: USD}
    - {carrier_id: CAR02, carrier_name: "BlueCurrent Shipping",        carrier_type: OCEAN_LINE,  primary_mode: OCEAN,       operating_region: ASIA_AFRICA,   payment_terms: NET45, default_currency: USD}
    - {carrier_id: CAR03, carrier_name: "AeroVolt Air Cargo",          carrier_type: AIR_CARGO,   primary_mode: AIR,         operating_region: GLOBAL,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR04, carrier_name: "VoltLine Express Air",        carrier_type: AIR_CARGO,   primary_mode: AIR,         operating_region: GLOBAL,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR05, carrier_name: "Continental Charter Air",     carrier_type: AIR_CARGO,   primary_mode: AIR_CHARTER, operating_region: GLOBAL,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR06, carrier_name: "SunHaul Trucking",            carrier_type: TRUCKING,    primary_mode: TRUCK,       operating_region: AFRICA,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR07, carrier_name: "TerraLink Road Freight",      carrier_type: TRUCKING,    primary_mode: TRUCK,       operating_region: GLOBAL,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR08, carrier_name: "PhotonRail Logistics",        carrier_type: RAIL,        primary_mode: RAIL,        operating_region: EURASIA,       payment_terms: NET45, default_currency: USD}
    - {carrier_id: CAR09, carrier_name: "GridWay Multimodal",          carrier_type: MULTIMODAL,  primary_mode: MULTIMODAL,  operating_region: GLOBAL,        payment_terms: NET45, default_currency: USD}
    - {carrier_id: CAR10, carrier_name: "Meridian Freight Forwarders", carrier_type: FORWARDER,   primary_mode: AIR,         operating_region: GLOBAL,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR11, carrier_name: "Cascade Customs & Brokerage", carrier_type: BROKER,      primary_mode: MULTIMODAL,  operating_region: GLOBAL,        payment_terms: NET30, default_currency: USD}
    - {carrier_id: CAR12, carrier_name: "LastMile Renewables Delivery", carrier_type: FINAL_MILE, primary_mode: TRUCK,       operating_region: AFRICA,        payment_terms: NET15, default_currency: USD}
  # Which carriers may serve each shipment mode (deterministic weighted pick).
  carrier_mode_pool:
    AIR:         [CAR03, CAR04, CAR10]
    AIR_CHARTER: [CAR05, CAR04]
    TRUCK:       [CAR06, CAR07, CAR12]
    OCEAN:       [CAR01, CAR02, CAR09]
    RAIL:        [CAR08]
    MULTIMODAL:  [CAR09, CAR11]

  # --- Transit standards (days) by mode. Source has NO departure timestamp,
  # so transit is NOT observable; these are mode/region operational standards
  # (derivation_method = MODE_REGION_STANDARD). See §lane_derivation.
  transit_standard_days:
    AIR: 5
    AIR_CHARTER: 3
    TRUCK: 4
    OCEAN: 32
    RAIL: 10
    MULTIMODAL: 20
  transit_noise_days: 3          # +/- seeded jitter on ACTUAL transit (clamped >=1)
  booking_lead_days: 4           # booking precedes planned ship
  data_sufficiency_thresholds: {high: 30, medium: 5}   # n shipments per lane
  # As-of reporting date: shipments whose (shifted) delivery falls after this
  # are treated as still IN_TRANSIT (goods-in-transit population); on/before it
  # they are DELIVERED. Lets Phase 3 compute GIT / open accrual realistically.
  data_as_of_date: "2025-07-01"    # ~3% of shipments still in transit at snapshot
  invoice_lag_days_range: [3, 15]   # invoice issued this many days after delivery

  # --- Mode imputation for the 360 rows with NULL shipment_mode ------------
  # Imputed deterministically from the global observed mode mix; flagged.
  impute_mode_weights: {AIR: 0.62, TRUCK: 0.29, AIR_CHARTER: 0.06, OCEAN: 0.03}

  # --- Product master (SKUs per renewable-energy category) -----------------
  # unit_weight_kg / unit_value_usd defaults are seeded from the observed
  # per-unit source distribution (median of weight/qty and value/qty). They
  # represent nominal pack/carton units, NOT full-panel physical specs.
  products_per_category: 5
  product_category_attrs:
    SOLAR_MODULE:  {uom: PACK, hazmat: false, temp_controlled: false, stackable: true,  hts_prefix: "8541"}
    INVERTER:      {uom: PACK, hazmat: false, temp_controlled: false, stackable: true,  hts_prefix: "8504"}
    BATTERY_ESS:   {uom: PACK, hazmat: true,  temp_controlled: true,  stackable: false, hts_prefix: "8507"}
    BOS_COMPONENT: {uom: PACK, hazmat: false, temp_controlled: false, stackable: true,  hts_prefix: "8544"}

  # --- Rate cards. rate_per_kg base by mode ~ observed median freight/kg;
  # carriers vary +/-12% deterministically. fuel_percentage is % of base.
  rate_card:
    effective_start: "2015-01-01"
    effective_end:   "2099-12-31"
    per_kg_base:  {AIR: 9.35, AIR_CHARTER: 3.85, TRUCK: 1.82, OCEAN: 1.62, RAIL: 1.20, MULTIMODAL: 2.50}
    min_charge:   {AIR: 120, AIR_CHARTER: 900, TRUCK: 150, OCEAN: 800, RAIL: 400, MULTIMODAL: 600}
    fuel_pct:     {AIR: 0.18, AIR_CHARTER: 0.18, TRUCK: 0.25, OCEAN: 0.12, RAIL: 0.15, MULTIMODAL: 0.15}
    carrier_rate_spread: 0.12
    rate_basis_by_mode: {AIR: PER_KG, AIR_CHARTER: PER_KG, TRUCK: PER_KG, OCEAN: PER_KG, RAIL: PER_KG, MULTIMODAL: PER_KG}
    tax_pct: 0.0                 # freight is typically zero-rated cross-border; kept explicit
  # Fraction of invoiced amount realized as small rating noise in the CLEAN
  # baseline (kept well within audit tolerance so baseline audit is clean).
  invoice_rating_noise_pct: 0.02

  # --- Purchase orders. POs group shipment lines that plausibly share a PO
  # (same po_so_number where present; else derived per source line).
  po_number_prefix: "PO-SUN"
  po_lead_days_before_ship: 21   # PO created ahead of planned ship

  # --- Warehouses (regional DCs; shipments From RDC route through one) ------
  warehouses:
    - {warehouse_id: WH01, warehouse_name: "SunGrid West Africa DC",   region: AFRICA,   warehouse_type: DISTRIBUTION_CENTER, capacity_weight_kg: 5000000, capacity_pallets: 8000}
    - {warehouse_id: WH02, warehouse_name: "SunGrid Southern Africa DC", region: AFRICA, warehouse_type: DISTRIBUTION_CENTER, capacity_weight_kg: 6000000, capacity_pallets: 9000}
    - {warehouse_id: WH03, warehouse_name: "SunGrid SE Asia DC",       region: ASIA,     warehouse_type: DISTRIBUTION_CENTER, capacity_weight_kg: 4000000, capacity_pallets: 7000}
    - {warehouse_id: WH04, warehouse_name: "SunGrid Americas DC",      region: AMERICAS, warehouse_type: DISTRIBUTION_CENTER, capacity_weight_kg: 3500000, capacity_pallets: 6000}
    - {warehouse_id: WH05, warehouse_name: "SunGrid Europe Hub",       region: EUROPE,   warehouse_type: CROSS_DOCK,          capacity_weight_kg: 3000000, capacity_pallets: 5000}

  # --- Milestones. Per-mode ordered templates; day offsets are relative to
  # actual_ship_date (delivery offset is derived from actual transit). Ranges
  # are jittered with the per-record seed.
  milestone_offsets_frac:        # fraction of transit elapsed at each milestone
    OCEAN:       {BOOKING_CONFIRMED: -0.15, PICKUP_COMPLETED: -0.02, ORIGIN_DEPARTURE: 0.0, EXPORT_CUSTOMS: 0.05, PORT_ARRIVAL: 0.85, IMPORT_CUSTOMS: 0.92, WAREHOUSE_ARRIVAL: 0.97, CUSTOMER_DELIVERY: 1.0, POD_RECEIVED: 1.02}
    AIR:         {BOOKING_CONFIRMED: -0.30, PICKUP_COMPLETED: -0.05, ORIGIN_DEPARTURE: 0.0, EXPORT_CUSTOMS: 0.10, PORT_ARRIVAL: 0.55, IMPORT_CUSTOMS: 0.75, WAREHOUSE_ARRIVAL: 0.90, CUSTOMER_DELIVERY: 1.0, POD_RECEIVED: 1.05}
    AIR_CHARTER: {BOOKING_CONFIRMED: -0.30, PICKUP_COMPLETED: -0.05, ORIGIN_DEPARTURE: 0.0, EXPORT_CUSTOMS: 0.10, PORT_ARRIVAL: 0.55, IMPORT_CUSTOMS: 0.75, WAREHOUSE_ARRIVAL: 0.90, CUSTOMER_DELIVERY: 1.0, POD_RECEIVED: 1.05}
    TRUCK:       {BOOKING_CONFIRMED: -0.25, PICKUP_COMPLETED: -0.02, ORIGIN_DEPARTURE: 0.0, WAREHOUSE_ARRIVAL: 0.80, OUT_FOR_DELIVERY: 0.95, CUSTOMER_DELIVERY: 1.0, POD_RECEIVED: 1.03}
    RAIL:        {BOOKING_CONFIRMED: -0.20, PICKUP_COMPLETED: -0.02, ORIGIN_DEPARTURE: 0.0, WAREHOUSE_ARRIVAL: 0.85, OUT_FOR_DELIVERY: 0.96, CUSTOMER_DELIVERY: 1.0, POD_RECEIVED: 1.03}
    MULTIMODAL:  {BOOKING_CONFIRMED: -0.15, PICKUP_COMPLETED: -0.02, ORIGIN_DEPARTURE: 0.0, EXPORT_CUSTOMS: 0.05, PORT_ARRIVAL: 0.80, IMPORT_CUSTOMS: 0.90, WAREHOUSE_ARRIVAL: 0.96, CUSTOMER_DELIVERY: 1.0, POD_RECEIVED: 1.02}

  # --- Accessorial charges (clean baseline: low-frequency, plausible, allowed)
  accessorial_base_rates:        # probability a shipment incurs each type
    DEMURRAGE:   {rate: 0.10, modes: [OCEAN, MULTIMODAL], amount_range: [400, 2500]}
    DETENTION:   {rate: 0.06, modes: [TRUCK, OCEAN, MULTIMODAL], amount_range: [150, 900]}
    STORAGE:     {rate: 0.05, modes: [OCEAN, TRUCK, MULTIMODAL, AIR], amount_range: [100, 1200]}
    LIFTGATE:    {rate: 0.08, modes: [TRUCK], amount_range: [45, 180]}
    CUSTOMS_DOC: {rate: 0.07, modes: [OCEAN, AIR, AIR_CHARTER, MULTIMODAL], amount_range: [60, 350]}

  # --- Claims (legitimate business records; weighted to risk factors) -------
  claims:
    base_rate: 0.025
    late_multiplier: 2.2
    high_value_multiplier: 1.8    # shipment_value above the 90th percentile
    partial_multiplier: 1.6
    ocean_multiplier: 1.4
    types: [DAMAGE, SHORTAGE, LOSS, DOCUMENTATION, TEMPERATURE_EXCURSION]
    root_causes: [ROUGH_HANDLING, PORT_CONGESTION, PACKAGING_FAILURE, DOCUMENTATION_ERROR, COLD_CHAIN_BREACH, CARRIER_DELAY]
    open_fraction: 0.20           # share left open (closed_date null)

  # --- Capacity (monthly per carrier x lane; utilization <=100% in baseline) -
  capacity_headroom_pct: 0.22     # committed capacity = booked / (1 - headroom*seasonal)

  # --- Invoice approval & payment ------------------------------------------
  approval:
    stages: [LOGISTICS_REVIEW, RATE_VALIDATION, FINANCE_APPROVAL, PAYMENT_RELEASE]
    review_days_range: [1, 12]
    pending_recent_days: 30       # invoices newer than this may stay pending
    paid_fraction_of_approved: 0.82

  # --- Accruals -------------------------------------------------------------
  accrual:
    month_end_cutoff_lag_days: 5  # invoices arriving within N days after period close still accrue


# ===========================================================================
# PHASE 3 — Analytics, freight audit, data quality, reporting (additive).
# All thresholds/weights are config-driven; SQL reads them from meta_* tables
# seeded by src/load_phase3.py. Nothing above is modified.
# ===========================================================================
phase3:
  # Reporting snapshot = the Phase 2 as-of date (single source of truth).
  as_of_date: "2025-07-01"

  # --- Data-quality scoring -------------------------------------------------
  dq_severity_weights: {CRITICAL: 10, HIGH: 5, MEDIUM: 2, LOW: 1}
  # dq_score = 1 - (weighted open exceptions / weighted record exposure), where
  # exposure = number of governed records * top severity weight. Documented in
  # documentation/metric_definitions.md.
  resolution_sla_hours: {CRITICAL: 24, HIGH: 72, MEDIUM: 168, LOW: 336}

  # Goods-in-transit aging buckets (upper bound inclusive; last is open-ended).
  git_aging_buckets: [7, 14, 30, 60]

  # --- Accessorial contractual bands (max reasonable amount by type). Used to
  # detect excessive charges; clean baseline stays within these.
  accessorial_max_allowed:
    DEMURRAGE: 2500
    DETENTION: 900
    STORAGE: 1200
    LIFTGATE: 180
    CUSTOMS_DOC: 350

  # --- Carrier scorecard ----------------------------------------------------
  carrier_scorecard:
    min_shipments: 50            # below this -> "Insufficient volume"
    weights:                     # must sum to 1.0 (validated in tests)
      otif: 0.30
      transit_reliability: 0.20
      cost_competitiveness: 0.15
      invoice_accuracy: 0.15
      pod_compliance: 0.10
      claims: 0.10
    classification_bands: {preferred: 80, acceptable: 65, improvement: 50}  # score >=

  lane_scorecard:
    min_shipments: 20

  # --- Freight-spend forecast (transparent, non-ML) ------------------------
  forecast:
    method: trailing_3m_plus_open   # trailing 3-month average + open-shipment expected cost
    trailing_months: 3

  # --- Exception ownership (business owner per exception type) --------------
  exception_owners:
    missing_carrier_id: Transportation Operations
    invalid_lane: Transportation Operations
    delivery_before_ship: Transportation Operations
    over_delivery: Warehouse Operations
    partial_delivery: Warehouse Operations
    missing_pod: Warehouse Operations
    missing_customs_doc: Trade Compliance
    missing_hts_code: Trade Compliance
    damaged_shipment_claim: Logistics Analytics
    invoice_carrier_mismatch: Accounts Payable
    incorrect_fuel_surcharge: Accounts Payable
    incorrect_currency: Accounts Payable
    expired_rate_card: Procurement
    duplicate_invoice: Accounts Payable
    duplicate_payment_risk: Accounts Payable
    invoice_without_shipment: Accounts Payable
    unauthorized_detention: Accounts Payable
    excessive_demurrage: Accounts Payable
    shipment_without_invoice: Logistics Analytics
    paid_without_approval: Accounts Payable
    invalid_milestone_sequence: Transportation Operations
    capacity_over_100: Transportation Operations
    broken_po_shipment: Procurement
